<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
  <link rel="icon" type="image/png" href="{{ '/icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body class="{{ page.theme | default: 'theme-home' }}">
  <div class="page">
    {% include header.html %}
    {% include nav.html %}
    {% include ticker.html %}
    {{ content }}
    {% include footer.html %}
  </div>
</body>
</html>
