---
layout: default
---
<main>
  <article class="panel post-entry">
    <p class="post-date">{{ page.date | date: "%d-%m-%Y" }}</p>
    <h2>{{ page.title }}</h2>
    <div class="post-body">
      {{ content }}
    </div>
    <p class="back-link"><a href="{{ '/thoughts/' | relative_url }}">back to thoughts</a></p>
  </article>
</main>
