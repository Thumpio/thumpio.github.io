# Controls the manual order of album/release groups on /songs/.
# The `name` value must match the `album` field in the matching song files.
# Smaller `order` numbers appear first.

- name: "Dreaming in Daylight"
  order: 1

- name: "Another Town"
  order: 2

- name: "Paper Mache"
  order: 3

- name: "Taking Long Showers"
  order: 4