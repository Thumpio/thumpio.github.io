<header class="site-head">
  {% if page.tiny_note %}<p class="tiny-note">{{ page.tiny_note }}</p>{% endif %}
  <h1 class="hero-title" aria-label="{{ page.hero_title | default: page.title | escape }}">
    {{ page.hero_title | default: page.title }}
  </h1>
  {% if page.tagline %}<p class="tagline">{{ page.tagline }}</p>{% endif %}

  {% if page.spotify_embed_url %}
    <div class="hero-embed" aria-label="Thumpi Spotify artist embed">
      <iframe src="{{ page.spotify_embed_url | escape }}" width="100%" height="352" frameborder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="Thumpi on Spotify"></iframe>
    </div>
  {% endif %}
</header>
